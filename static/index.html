<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wander — Travel, crafted for you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #F8F6F1;
    --bg-card:     #FFFFFF;
    --surface:     #F2F0EB;
    --ink:         #0C0C0E;
    --stone:       #8C8478;
    --stone-soft:  rgba(140,132,120,0.07);
    --stone-border:rgba(140,132,120,0.12);
    --text:        #0C0C0E;
    --text-dim:    #6A6460;
    --text-muted:  #B0A898;
    --border:      rgba(0,0,0,0.05);
    --border-hover:rgba(0,0,0,0.12);
    --shadow-soft: 0 1px 4px rgba(0,0,0,0.03), 0 8px 24px rgba(0,0,0,0.03);
    --shadow-lg:   0 20px 60px rgba(0,0,0,0.1);
    --font-serif:  'DM Serif Display', Georgia, serif;
    --font-sans:   'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    --ease:        cubic-bezier(0.32,0.72,0,1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { display: flex; flex-direction: column; overflow: hidden; }

  /* Paper grain */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
    opacity: 0.45;
  }

  /* ── Nav (split minimal) ── */
  .header {
    position: relative; z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    flex-shrink: 0;
  }
  .logo {
    font-family: var(--font-serif);
    font-size: 1.35rem;
    color: var(--ink);
    font-style: italic;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .logo-dot { color: var(--stone); font-style: normal; }
  .header-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .setting-group select {
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: transparent;
    color: var(--stone);
    font-family: var(--font-sans);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    transition: all 400ms var(--ease);
  }
  .setting-group select:hover { border-color: var(--border-hover); color: var(--ink); }

  /* ── Main Layout ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    padding: 0 48px 40px;
    gap: 0;
    transition: all 800ms var(--ease);
  }

  /* ── Chat Panel (centered column, shifts left on plan) ── */
  .chat-panel {
    flex: 1;
    max-width: 660px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    transition: all 800ms var(--ease);
  }
  .main.has-plan .chat-panel {
    max-width: 440px;
    margin: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 0 0 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .messages::-webkit-scrollbar { width: 2px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.06); border-radius: 2px; }
  .messages::-webkit-scrollbar-track { background: transparent; }

  /* Empty / welcome state */
  .empty-state { padding: 8px 0 20px; }
  .empty-state h1 {
    font-family: var(--font-serif);
    font-size: clamp(2rem, 3.8vw, 3.2rem);
    font-weight: 400;
    font-style: italic;
    line-height: 1.06;
    letter-spacing: -0.04em;
    color: var(--ink);
    margin-bottom: 16px;
  }
  .empty-state h1 em {
    font-style: italic;
  }
  .empty-state p {
    color: var(--text-dim);
    font-size: 0.95rem;
    line-height: 1.7;
    font-weight: 300;
    max-width: 460px;
  }

  /* Messages */
  .msg {
    max-width: 84%;
    padding: 13px 20px;
    line-height: 1.6;
    font-size: 0.9rem;
    font-weight: 300;
    white-space: pre-wrap;
    word-break: break-word;
    animation: fadeUp 500ms var(--ease) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user {
    align-self: flex-end;
    background: var(--ink);
    color: #F8F6F1;
    border-radius: 20px 20px 4px 20px;
  }
  /* AI msg: double-bezel shell */
  .msg.assistant {
    align-self: flex-start;
    background: rgba(0,0,0,0.02);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 3px;
  }
  .msg.assistant .bubble {
    background: var(--bg-card);
    border-radius: 19px;
    padding: 13px 20px;
    color: #3A3632;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 1px 4px rgba(0,0,0,0.03);
    line-height: 1.6;
    font-size: 0.9rem;
    font-weight: 300;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-muted);
    font-size: 0.8rem;
    padding: 4px 0;
    font-style: italic;
    font-family: var(--font-serif);
  }

  /* Typing indicator */
  .typing {
    align-self: flex-start;
    padding: 14px 20px;
    background: rgba(0,0,0,0.02);
    border: 1px solid var(--border);
    border-radius: 22px;
    display: none;
    margin-bottom: 8px;
  }
  .typing.active { display: inline-flex; gap: 5px; align-items: center; }
  .typing span {
    width: 5px; height: 5px;
    background: var(--stone);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
    opacity: 0.35;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* View plan pill */
  .view-plan-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 8px 18px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 100px;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 0.78rem;
    font-weight: 500;
    transition: all 400ms var(--ease);
  }
  .view-plan-btn:hover {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  /* ── Quick starts (horizontal pills) ── */
  .quick-starts {
    padding: 0 0 20px;
  }
  .quick-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 10px;
  }
  .quick-btn {
    display: inline-block;
    padding: 11px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-family: var(--font-sans);
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--stone);
    cursor: pointer;
    transition: all 500ms var(--ease);
    text-align: left;
    line-height: 1.5;
    margin-right: 6px;
    margin-bottom: 6px;
  }
  .quick-btn:hover {
    border-color: var(--border-hover);
    color: var(--ink);
    background: rgba(0,0,0,0.02);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.04);
  }

  /* ── Input Area ── */
  .input-area {
    padding: 16px 0 0;
    margin-top: auto;
  }
  .input-bar {
    display: flex;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    transition: all 500ms var(--ease);
  }
  .input-bar:focus-within {
    border-color: var(--border-hover);
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
  }
  .input-bar input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 13px 20px;
    font-family: var(--font-sans);
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    font-weight: 300;
  }
  .input-bar input::placeholder {
    color: var(--text-muted);
    font-style: italic;
  }

  .send-btn {
    width: 46px;
    height: 46px;
    border: none;
    border-radius: 14px;
    background: var(--ink);
    color: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 400ms var(--ease);
    flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) {
    transform: scale(1.06);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .send-btn:active:not(:disabled) { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── Preview Panel (slides in from right) ── */
  .preview-panel {
    flex: 0;
    width: 0;
    overflow: hidden;
    opacity: 0;
    margin-left: 0;
    display: flex;
    flex-direction: column;
    transition: all 800ms var(--ease);
  }
  .main.has-plan .preview-panel {
    flex: 1;
    width: auto;
    opacity: 1;
    margin-left: 32px;
  }

  .preview-outer {
    flex: 1;
    background: rgba(0,0,0,0.02);
    border: 1px solid var(--border);
    border-radius: 1.5rem;
    padding: 4px;
    display: flex;
    flex-direction: column;
  }
  .preview-inner {
    flex: 1;
    background: var(--bg-card);
    border-radius: calc(1.5rem - 4px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 4px rgba(0,0,0,0.02);
  }
  .preview-inner::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(140,132,120,0.04) 0%, transparent 65%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .preview-placeholder {
    text-align: center;
    padding: 60px;
  }
  .preview-placeholder .illustration {
    width: 120px; height: 120px;
    margin-bottom: 32px;
    opacity: 0.15;
  }
  .preview-placeholder h2 {
    font-family: var(--font-serif);
    font-size: 1.45rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 10px;
    letter-spacing: -0.02em;
  }
  .preview-placeholder p {
    color: var(--text-dim);
    font-size: 0.85rem;
    line-height: 1.7;
    max-width: 300px;
    font-weight: 300;
    margin: 0 auto;
  }

  /* ── Progress ── */
  .progress-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: var(--bg-card);
    z-index: 10;
    align-items: center;
    justify-content: center;
    padding: 60px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .progress-overlay.active { display: flex; opacity: 1; }
  .progress-content { text-align: center; max-width: 440px; }
  .progress-loader {
    width: 52px; height: 52px;
    margin: 0 auto 32px;
    position: relative;
  }
  .progress-loader::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid var(--border);
  }
  .progress-loader::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid transparent;
    border-top-color: var(--ink);
    border-right-color: var(--ink);
    animation: spin 1.4s cubic-bezier(0.5, 0, 0.5, 1) infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-status {
    font-family: var(--font-serif);
    font-size: 1.35rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 8px;
    line-height: 1.3;
    letter-spacing: -0.02em;
  }
  .progress-sub {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 32px;
    font-style: italic;
    font-family: var(--font-serif);
  }
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin: 0 auto 10px;
    width: 260px;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--ink);
    border-radius: 2px;
    transition: width 0.6s var(--ease);
  }
  .progress-pct {
    font-size: 0.68rem;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .preview-panel iframe {
    flex: 1;
    border: none;
    width: 100%;
    display: none;
    background: white;
    border-radius: calc(1.5rem - 4px);
  }

  /* ── Survey ── */
  .survey-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(12, 12, 14, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 20px;
  }
  .survey-overlay.hidden { display: none; }
  .survey-card {
    background: var(--bg-card);
    border-radius: 24px;
    padding: 48px 52px 40px;
    max-width: 600px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    position: relative;
  }
  .survey-card::-webkit-scrollbar { width: 3px; }
  .survey-card::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.06); border-radius: 2px; }
  .survey-header { margin-bottom: 36px; }
  .survey-card .eyebrow {
    font-family: var(--font-serif);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--stone);
    font-style: italic;
    margin-bottom: 12px;
    font-weight: 400;
  }
  .survey-card h2 {
    font-family: var(--font-serif);
    font-size: 2.1rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }
  .survey-card h2 em { font-style: italic; }
  .survey-sub {
    color: var(--text-dim);
    font-size: 0.92rem;
    line-height: 1.65;
    font-weight: 300;
    max-width: 460px;
  }
  .survey-section { margin-bottom: 28px; }
  .survey-section label {
    display: block;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 0.7rem;
    color: var(--stone);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }
  .survey-options { display: flex; flex-wrap: wrap; gap: 8px; }
  .survey-chip {
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-family: var(--font-sans);
    font-size: 0.86rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 300ms var(--ease);
    user-select: none;
    color: var(--text-dim);
    background: transparent;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .survey-chip:hover {
    border-color: var(--border-hover);
    color: var(--ink);
  }
  .survey-chip.selected {
    border-color: var(--ink);
    background: var(--ink);
    color: var(--bg);
  }
  .survey-chip .chip-icon { font-size: 1rem; line-height: 1; }
  .survey-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: var(--font-sans);
    font-size: 0.9rem;
    color: var(--text);
    background: transparent;
    outline: none;
    transition: border-color 300ms var(--ease);
    font-weight: 300;
  }
  .survey-input:focus { border-color: var(--border-hover); }
  .survey-input::placeholder { color: var(--text-muted); }
  .survey-row { display: flex; gap: 12px; }
  .survey-row .survey-field { flex: 1; }
  .survey-field label {
    display: block;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 0.7rem;
    color: var(--stone);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }
  .survey-submit {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    margin-top: 12px;
    background: var(--ink);
    color: var(--bg);
    font-family: var(--font-sans);
    font-size: 0.92rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 400ms var(--ease);
    letter-spacing: 0.02em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .survey-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .survey-submit svg { transition: transform 300ms var(--ease); }
  .survey-submit:hover svg { transform: translateX(3px); }

  /* ── Mobile ── */
  @media (max-width: 960px) {
    .header { padding: 16px 24px; }
    .logo { font-size: 1.15rem; }
    .main { flex-direction: column; padding: 0 24px 24px; }
    .chat-panel {
      max-width: 100% !important;
      margin: 0 !important;
      flex: 1;
    }
    .main.has-plan .preview-panel {
      margin-left: 0;
      margin-top: 16px;
      flex: 1;
      min-height: 320px;
    }
    .messages { padding: 0 0 12px; }
    .empty-state h1 { font-size: 1.8rem; }
    .survey-card { padding: 32px 24px 24px; border-radius: 20px; }
    .survey-card h2 { font-size: 1.7rem; }
    .progress-status { font-size: 1.15rem; }
  }

  @media (max-width: 520px) {
    .header { padding: 14px 18px; }
    .setting-group select { padding: 5px 12px; font-size: 0.68rem; }
  }
</style>
</head>
<body>

<!-- Survey Overlay -->
<div class="survey-overlay hidden" id="surveyOverlay">
  <div class="survey-card">
    <div class="survey-header">
      <div class="eyebrow" id="surveyEyebrow"></div>
      <h2 id="surveyTitle"></h2>
      <div class="survey-sub" id="surveySub"></div>
    </div>
    <div class="survey-section" data-field="required_fields" id="sectionRequired" style="display:none;">
      <div class="survey-row">
        <div class="survey-field" id="fieldDest" style="display:none;">
          <label id="labelDest"></label>
          <input type="text" class="survey-input" id="inputDest" placeholder="">
        </div>
        <div class="survey-field" id="fieldDays" style="display:none;">
          <label id="labelDays"></label>
          <input type="number" class="survey-input" id="inputDays" min="1" max="30" placeholder="">
        </div>
      </div>
    </div>
    <div class="survey-section" data-field="travel_style">
      <label id="labelStyle"></label>
      <div class="survey-options" id="optStyle"></div>
    </div>
    <div class="survey-section" data-field="budget_tier">
      <label id="labelBudget"></label>
      <div class="survey-options" id="optBudget"></div>
    </div>
    <div class="survey-section" data-field="interests">
      <label id="labelInterest"></label>
      <div class="survey-options" id="optInterest"></div>
    </div>
    <button class="survey-submit" id="surveySubmit" onclick="submitSurvey()">
      <span id="surveySubmitText"></span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>

<!-- Nav -->
<div class="header">
  <div class="logo"><span id="logo">Wander</span><span class="logo-dot">.</span></div>
  <div class="header-right">
    <div class="setting-group">
      <select id="langSelect" onchange="switchLang(this.value)">
        <option value="en">English</option>
        <option value="zh">中文</option>
      </select>
    </div>
    <div class="setting-group">
      <select id="currencySelect">
        <option value="CAD">CAD</option>
        <option value="USD">USD</option>
      </select>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main" id="mainLayout">
  <!-- Chat -->
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <h1 id="emptyHeading"></h1>
        <p id="emptySub"></p>
      </div>
    </div>
    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>
    <div class="quick-starts" id="quickStarts"></div>
    <div class="input-area">
      <div class="input-bar">
        <input type="text" id="input" placeholder="" autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="send()" aria-label="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-panel">
    <div class="preview-outer">
      <div class="preview-inner">
        <div class="preview-placeholder" id="placeholder">
          <svg class="illustration" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="70" cy="70" r="58" stroke="#0C0C0E" stroke-width="0.8"/>
            <ellipse cx="70" cy="70" rx="58" ry="22" stroke="#0C0C0E" stroke-width="0.8"/>
            <ellipse cx="70" cy="70" rx="58" ry="44" stroke="#0C0C0E" stroke-width="0.8"/>
            <ellipse cx="70" cy="70" rx="28" ry="58" stroke="#0C0C0E" stroke-width="0.8"/>
            <line x1="12" y1="70" x2="128" y2="70" stroke="#0C0C0E" stroke-width="0.8"/>
            <line x1="70" y1="12" x2="70" y2="128" stroke="#0C0C0E" stroke-width="0.8"/>
            <circle cx="92" cy="48" r="2" fill="#8C8478"/>
          </svg>
          <h2 id="previewTitle"></h2>
          <p id="previewHint"></p>
        </div>
        <div class="progress-overlay" id="progressOverlay">
          <div class="progress-content">
            <div class="progress-loader"></div>
            <div class="progress-status" id="progressStatus"></div>
            <div class="progress-sub" id="progressSub"></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-pct" id="progressPct">0%</div>
          </div>
        </div>
        <iframe id="planFrame" sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-forms allow-top-navigation-by-user-activation"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Survey Config ─────────────────────────────────
  const SURVEY = {
    zh: {
      eyebrow: "开始之前",
      title: "让我<em>了解你</em>",
      sub: "花 10 秒告诉我你的旅行风格，我会为你量身打造这趟旅程。",
      eyebrowPartial: "还差一点",
      titlePartial: "再<em>确认几件</em>小事",
      subPartial: "其他都从你的话里读到了，只剩这些——选完就出发。",
      dest: "目的地",
      destPlaceholder: "例如：东京、巴黎、曼谷",
      days: "旅行天数",
      daysPlaceholder: "例如：5",
      style: "和谁一起",
      budget: "预算档次",
      pace: "旅行节奏",
      interest: "感兴趣的（可多选）",
      submit: "开启旅程",
      styles:  [{v:"solo",t:"独自",i:"🧳"},{v:"couple",t:"情侣",i:"🤍"},{v:"family",t:"家庭",i:"🏡"},{v:"friends",t:"朋友",i:"✨"}],
      budgets: [{v:"budget",t:"精打细算",i:""},{v:"comfort",t:"舒适",i:""},{v:"luxury",t:"奢华",i:""}],
      interests:[{v:"food",t:"美食",i:"🍃"},{v:"culture",t:"文化历史",i:"📜"},{v:"nature",t:"自然",i:"🌿"},{v:"shopping",t:"购物",i:"🛍"},{v:"adventure",t:"冒险",i:"🏔"},{v:"instagrammable",t:"出片",i:"📷"}],
    },
    en: {
      eyebrow: "Before we begin",
      title: "Let me <em>know you</em>",
      sub: "Take ten seconds to share your travel style — I'll craft this journey around you.",
      eyebrowPartial: "Almost there",
      titlePartial: "Just a <em>quick confirm</em>",
      subPartial: "I picked up the rest from your message — choose these and we're off.",
      dest: "Destination",
      destPlaceholder: "e.g. Tokyo, Paris, Bangkok",
      days: "Trip duration (days)",
      daysPlaceholder: "e.g. 5",
      style: "Traveling with",
      budget: "Budget level",
      interest: "What interests you (pick multiple)",
      submit: "Begin the Journey",
      styles:  [{v:"solo",t:"Solo",i:"🧳"},{v:"couple",t:"Couple",i:"🤍"},{v:"family",t:"Family",i:"🏡"},{v:"friends",t:"Friends",i:"✨"}],
      budgets: [{v:"budget",t:"Mindful",i:""},{v:"comfort",t:"Comfort",i:""},{v:"luxury",t:"Luxury",i:""}],
      interests:[{v:"food",t:"Food",i:"🍃"},{v:"culture",t:"Culture",i:"📜"},{v:"nature",t:"Nature",i:"🌿"},{v:"shopping",t:"Shopping",i:"🛍"},{v:"adventure",t:"Adventure",i:"🏔"},{v:"instagrammable",t:"Photo spots",i:"📷"}],
    }
  };

  let surveyProfile = { travel_style: '', budget_tier: '', interests: [] };
  let _surveyExtracted = {};
  let _surveyMissing = [];

  function buildSurvey(lang) {
    const s = SURVEY[lang];
    document.getElementById('surveyEyebrow').textContent = s.eyebrow;
    document.getElementById('surveyTitle').innerHTML = s.title;
    document.getElementById('surveySub').textContent = s.sub;
    document.getElementById('labelDest').textContent = s.dest;
    document.getElementById('inputDest').placeholder = s.destPlaceholder;
    document.getElementById('labelDays').textContent = s.days;
    document.getElementById('inputDays').placeholder = s.daysPlaceholder;
    document.getElementById('labelStyle').textContent = s.style;
    document.getElementById('labelBudget').textContent = s.budget;
    document.getElementById('labelInterest').textContent = s.interest;
    document.getElementById('surveySubmitText').textContent = s.submit;

    function renderChips(containerId, items, field, multi) {
      const c = document.getElementById(containerId);
      c.innerHTML = '';
      items.forEach(function(item) {
        const chip = document.createElement('div');
        chip.className = 'survey-chip';
        const iconSpan = item.i ? '<span class="chip-icon">' + item.i + '</span>' : '';
        chip.innerHTML = iconSpan + item.t;
        chip.onclick = function() {
          if (multi) {
            chip.classList.toggle('selected');
            const idx = surveyProfile[field].indexOf(item.v);
            if (idx >= 0) surveyProfile[field].splice(idx, 1);
            else surveyProfile[field].push(item.v);
          } else {
            c.querySelectorAll('.survey-chip').forEach(function(el) { el.classList.remove('selected'); });
            chip.classList.add('selected');
            surveyProfile[field] = item.v;
          }
        };
        c.appendChild(chip);
      });
    }

    renderChips('optStyle', s.styles, 'travel_style', false);
    renderChips('optBudget', s.budgets, 'budget_tier', false);
    renderChips('optInterest', s.interests, 'interests', true);
  }

  async function submitSurvey() {
    const dest = document.getElementById('inputDest').value.trim() || (_surveyExtracted.destination || '');
    const daysVal = document.getElementById('inputDays').value.trim();
    const days = daysVal ? parseInt(daysVal, 10) : (_surveyExtracted.duration_days || null);

    if (!dest) { document.getElementById('inputDest').focus(); return; }
    if (!days) { document.getElementById('inputDays').focus(); return; }

    if (!surveyProfile.travel_style) surveyProfile.travel_style = _surveyExtracted.travel_style || 'friends';
    if (!surveyProfile.budget_tier) surveyProfile.budget_tier = _surveyExtracted.budget_tier || 'comfort';
    if (!surveyProfile.interests.length) {
      surveyProfile.interests = (_surveyExtracted.interests && _surveyExtracted.interests.length)
        ? _surveyExtracted.interests : ['food', 'culture'];
    }

    document.getElementById('surveyOverlay').classList.add('hidden');
    const t = I18N[currentLang];
    const currency = document.getElementById('currencySelect').value;

    quickStarts.style.display = 'none';
    showProgress(10, t.thinking);
    typingEl.classList.add('active');
    sending = true;
    sendBtn.disabled = true;

    try {
      const resp = await fetch('/api/survey', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId, language: currentLang, currency: currency,
          destination: dest, duration_days: days,
          travel_style: surveyProfile.travel_style,
          budget_tier: surveyProfile.budget_tier,
          interests: surveyProfile.interests,
        })
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let eventType = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('event: ')) {
            eventType = line.slice(7).trim();
          } else if (line.startsWith('data: ') && eventType) {
            try {
              const data = JSON.parse(line.slice(6));
              if (eventType === 'progress') showProgress(data.pct, data.status);
              else if (eventType === 'plan_partial') handlePlanPartial(data.plan || {});
              else if (eventType === 'done') {
                sessionId = data.session_id;
                typingEl.classList.remove('active');
                hideProgress();
                addMessage('assistant', data.reply);
                if (data.plan_html) showPlan(data.plan_html);
              }
            } catch (e) {}
            eventType = '';
          }
        }
      }
    } catch (err) {
      addMessage('system', t.networkError);
    } finally {
      sending = false;
      sendBtn.disabled = false;
      typingEl.classList.remove('active');
      hideProgress();
    }
  }

  function openSurvey(missing, extracted) {
    const s = SURVEY[currentLang];
    _surveyExtracted = extracted || {};
    _surveyMissing = missing || [];
    surveyProfile = { travel_style: '', budget_tier: '', pace: '', interests: [] };

    const hasRequired = missing.indexOf('destination') < 0 && missing.indexOf('duration_days') < 0;
    const profileMissing = missing.filter(function(f) { return f !== 'destination' && f !== 'duration_days'; });

    if (hasRequired && profileMissing.length < 4) {
      document.getElementById('surveyEyebrow').textContent = s.eyebrowPartial;
      document.getElementById('surveyTitle').innerHTML = s.titlePartial;
      document.getElementById('surveySub').textContent = s.subPartial;
    } else {
      document.getElementById('surveyEyebrow').textContent = s.eyebrow;
      document.getElementById('surveyTitle').innerHTML = s.title;
      document.getElementById('surveySub').textContent = s.sub;
    }

    const needDest = missing.indexOf('destination') >= 0;
    const needDays = missing.indexOf('duration_days') >= 0;
    document.getElementById('sectionRequired').style.display = (needDest || needDays) ? '' : 'none';
    document.getElementById('fieldDest').style.display = needDest ? '' : 'none';
    document.getElementById('fieldDays').style.display = needDays ? '' : 'none';
    document.getElementById('inputDest').value = '';
    document.getElementById('inputDays').value = '';

    document.querySelectorAll('.survey-section[data-field]').forEach(function(el) {
      const field = el.getAttribute('data-field');
      if (field === 'required_fields') return;
      el.style.display = missing.indexOf(field) >= 0 ? '' : 'none';
    });

    if (extracted.travel_style && missing.indexOf('travel_style') >= 0) {
      surveyProfile.travel_style = extracted.travel_style;
    }
    if (extracted.budget_tier && missing.indexOf('budget_tier') >= 0) {
      surveyProfile.budget_tier = extracted.budget_tier;
    }
    if (extracted.pace && missing.indexOf('pace') >= 0) {
      surveyProfile.pace = extracted.pace;
    }

    document.getElementById('surveyOverlay').classList.remove('hidden');
  }

  // ── i18n ─────────────────────────────────────────
  const I18N = {
    zh: {
      logo: "Wander",
      emptyHeading: "你下一段<em>旅程</em><br>会是什么模样？",
      emptySub: "和我说说你的想法吧——哪怕只是一个模糊的念头。",
      placeholder: "我想去……",
      previewTitle: "旅程，即将展开",
      previewHint: "你的完整行程会在这里徐徐铺开——地图、图片、视频与细节，一切都为你而备。",
      viewPlan: "查看行程",
      networkError: "网络似乎走神了，请再试一次",
      thinking: "让我想一想……",
      quickLabel: "或者试试看",
      quickStarts: [
        "从温哥华去西雅图 1 天，一个人，预算 $200，喜欢咖啡和市场"
      ],
      progressSub: "正在为你编织这段旅程"
    },
    en: {
      logo: "Wander",
      emptyHeading: "Where will your<br><em>next journey</em> unfold?",
      emptySub: "Tell me what you're dreaming of — even a rough idea is enough to begin.",
      placeholder: "I'd love to visit…",
      previewTitle: "Your journey awaits",
      previewHint: "Your tailored itinerary will unfold here — maps, photos, videos, and every detail, crafted for you.",
      viewPlan: "View journey",
      networkError: "The connection drifted — let's try again",
      thinking: "Reading your thoughts…",
      quickLabel: "Or start with",
      quickStarts: [
        "From Vancouver to Seattle, 1 day, solo trip, budget $200. Love coffee and markets."
      ],
      progressSub: "Crafting your journey"
    }
  };

  let currentLang = 'en';
  let sessionId = null;
  let sending = false;

  const mainLayout = document.getElementById('mainLayout');
  const messagesEl = document.getElementById('messages');
  const emptyStateEl = document.getElementById('emptyState');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const typingEl = document.getElementById('typing');
  const placeholderEl = document.getElementById('placeholder');
  const planFrame = document.getElementById('planFrame');
  const quickStarts = document.getElementById('quickStarts');

  function applyLang(lang) {
    currentLang = lang;
    const t = I18N[lang];
    document.getElementById('logo').textContent = t.logo;
    document.getElementById('emptyHeading').innerHTML = t.emptyHeading;
    document.getElementById('emptySub').textContent = t.emptySub;
    inputEl.placeholder = t.placeholder;
    document.getElementById('previewTitle').textContent = t.previewTitle;
    document.getElementById('previewHint').textContent = t.previewHint;
    document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';

    quickStarts.innerHTML = '';
    var label = document.createElement('div');
    label.className = 'quick-label';
    label.textContent = t.quickLabel;
    quickStarts.appendChild(label);
    t.quickStarts.forEach(function(text) {
      var btn = document.createElement('div');
      btn.className = 'quick-btn';
      btn.textContent = text;
      btn.onclick = function() { sendQuick(btn); };
      quickStarts.appendChild(btn);
    });
  }

  function switchLang(lang) {
    applyLang(lang);
    buildSurvey(lang);
    if (sessionId && planFrame.style.display === 'block') {
      rerenderPlan(lang);
    }
  }

  function rerenderPlan(lang) {
    fetch('/api/rerender', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, language: lang })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.plan_html) showPlan(d.plan_html);
    })
    .catch(function() {});
  }

  // Init
  applyLang('en');
  buildSurvey('en');

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.isComposing) send();
  });

  function sendQuick(el) {
    inputEl.value = el.textContent;
    send();
  }

  function addMessage(role, text) {
    const t = I18N[currentLang];
    if (emptyStateEl && emptyStateEl.parentNode) {
      emptyStateEl.style.display = 'none';
    }

    const div = document.createElement('div');
    div.className = 'msg ' + role;

    if (role === 'assistant') {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      if (planFrame.style.display === 'block') {
        const btn = document.createElement('button');
        btn.className = 'view-plan-btn';
        btn.innerHTML = t.viewPlan + ' <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
        btn.onclick = function() {
          document.querySelector('.preview-panel').scrollIntoView({ behavior: 'smooth' });
        };
        bubble.appendChild(document.createElement('br'));
        bubble.appendChild(btn);
      }

      div.appendChild(bubble);
    } else {
      div.textContent = text;
    }

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showPlan(html) {
    mainLayout.classList.add('has-plan');
    placeholderEl.style.display = 'none';
    planFrame.style.display = 'block';
    var inject = '<script>window._sessionId="' + (sessionId || '') + '";<\/script>';
    planFrame.srcdoc = html.replace('</head>', inject + '</head>');
  }

  const progressOverlay = document.getElementById('progressOverlay');
  const progressStatus = document.getElementById('progressStatus');
  const progressSub = document.getElementById('progressSub');
  const progressFill = document.getElementById('progressFill');
  const progressPct = document.getElementById('progressPct');

  let _progressShownAt = 0;
  let _hideProgressTimer = null;

  function showProgress(pct, status) {
    const t = I18N[currentLang];
    if (_hideProgressTimer) { clearTimeout(_hideProgressTimer); _hideProgressTimer = null; }
    mainLayout.classList.add('has-plan');
    placeholderEl.style.display = 'none';
    progressOverlay.style.display = 'flex';
    void progressOverlay.offsetHeight;
    progressOverlay.classList.add('active');
    progressFill.style.width = pct + '%';
    progressStatus.textContent = status;
    progressSub.textContent = t.progressSub;
    progressPct.textContent = pct + '%';
    if (!_progressShownAt) _progressShownAt = Date.now();
  }

  function hideProgress() {
    if (_hideProgressTimer) { clearTimeout(_hideProgressTimer); _hideProgressTimer = null; }
    if (!_progressShownAt) {
      progressOverlay.classList.remove('active');
      progressOverlay.style.display = '';
      return;
    }
    const elapsed = Date.now() - _progressShownAt;
    const minTime = 600;
    if (elapsed < minTime) {
      _hideProgressTimer = setTimeout(hideProgress, minTime - elapsed);
      return;
    }
    _progressShownAt = 0;
    progressOverlay.classList.remove('active');
    setTimeout(function() {
      if (!progressOverlay.classList.contains('active')) {
        progressOverlay.style.display = '';
        progressFill.style.width = '0%';
        progressStatus.textContent = '';
        progressSub.textContent = '';
        progressPct.textContent = '0%';
      }
    }, 300);
  }

  function handlePlanPartial(plan) {
    const t = I18N[currentLang];
    mainLayout.classList.add('has-plan');
    placeholderEl.style.display = 'none';
    progressOverlay.style.display = 'flex';
    progressOverlay.classList.add('active');
    if (!_progressShownAt) _progressShownAt = Date.now();

    if (plan.title) progressStatus.textContent = plan.title;
    else if (plan.destination) progressStatus.textContent = plan.destination;

    const days = Array.isArray(plan.daily_plans) ? plan.daily_plans : [];
    if (days.length > 0) {
      const last = days[days.length - 1] || {};
      const dayLabel = `Day ${last.day || days.length}`;
      const theme = last.theme ? ' · ' + last.theme : '';
      const actCount = Array.isArray(last.activities) ? last.activities.length : 0;
      const actLabel = actCount > 0
        ? (currentLang === 'zh' ? ` · ${actCount} 个活动` : ` · ${actCount} activities`)
        : '';
      progressSub.textContent = dayLabel + theme + actLabel;
    } else if (plan.overview) {
      progressSub.textContent = plan.overview.slice(0, 80);
    }

    if (days.length > 0) {
      const pct = Math.min(70, 50 + days.length * 3);
      progressFill.style.width = pct + '%';
      progressPct.textContent = pct + '%';
    }
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || sending) return;

    quickStarts.style.display = 'none';
    addMessage('user', text);
    inputEl.value = '';
    sending = true;
    sendBtn.disabled = true;
    typingEl.classList.add('active');

    const t = I18N[currentLang];
    const currency = document.getElementById('currencySelect').value;
    showProgress(5, t.thinking);

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          message: text,
          language: currentLang,
          currency: currency,
        })
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let eventType = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('event: ')) {
            eventType = line.slice(7).trim();
          } else if (line.startsWith('data: ') && eventType) {
            try {
              const data = JSON.parse(line.slice(6));
              if (eventType === 'progress') showProgress(data.pct, data.status);
              else if (eventType === 'plan_partial') handlePlanPartial(data.plan || {});
              else if (eventType === 'show_survey') {
                hideProgress();
                typingEl.classList.remove('active');
                openSurvey(data.missing_fields || [], data.extracted || {});
              } else if (eventType === 'done') {
                sessionId = data.session_id;
                typingEl.classList.remove('active');
                hideProgress();
                addMessage('assistant', data.reply);
                if (data.plan_html) showPlan(data.plan_html);
              }
            } catch (e) {}
            eventType = '';
          }
        }
      }
    } catch (err) {
      addMessage('system', t.networkError);
    } finally {
      sending = false;
      sendBtn.disabled = false;
      typingEl.classList.remove('active');
      hideProgress();
    }
  }
</script>
</body>
</html>
